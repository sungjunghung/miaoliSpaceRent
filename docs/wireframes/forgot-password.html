<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>線框 · 忘記密碼</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="wireframe.css">
</head>
<body class="wf-annotate bg-base-200">
<div class="wf-topbar">
  <strong>線框 · 忘記密碼（/forgot-password）</strong>
  <label>檢視 <select data-wf-viewport class="select select-xs"><option value="1024px">桌機</option><option value="390px">手機</option></select></label>
  <label class="flex items-center gap-1"><input type="checkbox" data-wf-annotate checked class="checkbox checkbox-xs"> 區塊標註</label>
  <a href="index.html">← 全部頁面</a>
</div>

<div class="wf-canvas bg-base-100 shadow-xl">
  <header id="wf-header" data-active="" data-sub="會員與帳號 / 忘記密碼"></header>

  <main class="flex justify-center p-4">
    <div class="wf-region w-full max-w-sm">
      <span class="wf-region__label badge badge-primary badge-sm">★ 第一眼焦點 · 輸入 Email</span>
      <p class="wf-note">單一任務頁：只問一件事 — 要寄重設連結到哪</p>
      <div class="card bg-base-100 border shadow"><div class="card-body gap-3">
        <h1 class="text-xl font-bold text-center">重設密碼</h1>
        <p class="text-sm opacity-70">輸入註冊 Email，我們將寄送重設連結。</p>
        <input class="input input-bordered" placeholder="Email">
        <button class="btn btn-primary btn-block">寄送重設連結</button>
        <a class="link link-hover text-sm text-center" href="login.html">← 返回登入</a>
      </div></div>
    </div>
  </main>
</div>
<script src="wireframe.js"></script>
</body>
</html>
