<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>線框 · 登入</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="wireframe.css">
</head>
<body class="wf-annotate bg-base-200">
<div class="wf-topbar">
  <strong>線框 · 登入（/login）</strong>
  <label>檢視 <select data-wf-viewport class="select select-xs"><option value="1024px">桌機</option><option value="390px">手機</option></select></label>
  <label class="flex items-center gap-1"><input type="checkbox" data-wf-annotate checked class="checkbox checkbox-xs"> 區塊標註</label>
  <a href="index.html">← 全部頁面</a>
</div>

<div class="wf-canvas bg-base-100 shadow-xl">
  <header id="wf-header" data-active="" data-sub="會員與帳號 / 登入"></header>

  <main class="flex justify-center p-4">
    <div class="wf-region w-full max-w-sm">
      <span class="wf-region__label badge badge-primary badge-sm">★ 第一眼焦點 · 登入表單</span>
      <p class="wf-note">焦點就是帳密兩欄 + 登入鈕；其餘都是輔助連結</p>
      <div class="card bg-base-100 border shadow"><div class="card-body gap-3">
        <h1 class="text-xl font-bold text-center">會員登入</h1>
        <input class="input input-bordered" placeholder="帳號 / Email">
        <input class="input input-bordered" type="password" placeholder="密碼">
        <button class="btn btn-primary btn-block">登入</button>
        <div class="flex justify-between text-sm">
          <a class="link link-hover" href="forgot-password.html">忘記密碼？</a>
          <a class="link link-hover" href="register.html">註冊新帳號</a>
        </div>
      </div></div>
    </div>
  </main>
</div>
<script src="wireframe.js"></script>
</body>
</html>
