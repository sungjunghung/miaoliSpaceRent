<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>線框 · 重設密碼</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="wireframe.css">
</head>
<body class="wf-annotate bg-base-200">
<div class="wf-topbar">
  <strong>線框 · 重設密碼（/reset-password）</strong>
  <label>檢視 <select data-wf-viewport class="select select-xs"><option value="1024px">桌機</option><option value="390px">手機</option></select></label>
  <label class="flex items-center gap-1"><input type="checkbox" data-wf-annotate checked class="checkbox checkbox-xs"> 區塊標註</label>
  <a href="index.html">← 全部頁面</a>
</div>

<div class="wf-canvas bg-base-100 shadow-xl">
  <header id="wf-header" data-active="" data-sub="會員與帳號 / 重設密碼"></header>

  <main class="flex justify-center p-4">
    <div class="wf-region w-full max-w-sm">
      <span class="wf-region__label badge badge-primary badge-sm">★ 第一眼焦點 · 設定新密碼</span>
      <p class="wf-note">兩欄新密碼 + 即時強度/一致性提示，避免送出才退回</p>
      <div class="card bg-base-100 border shadow"><div class="card-body gap-3">
        <h1 class="text-xl font-bold text-center">設定新密碼</h1>
        <input class="input input-bordered" type="password" placeholder="新密碼">
        <input class="input input-bordered" type="password" placeholder="再次輸入新密碼">
        <progress class="progress progress-success w-full" value="60" max="100"></progress>
        <button class="btn btn-primary btn-block">確認重設</button>
      </div></div>
    </div>
  </main>
</div>
<script src="wireframe.js"></script>
</body>
</html>
