<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>線框 · 註冊完成</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="wireframe.css">
</head>
<body class="wf-annotate bg-base-200">
<div class="wf-topbar">
  <strong>線框 · 註冊完成（/register/confirmation）</strong>
  <label>檢視 <select data-wf-viewport class="select select-xs"><option value="1024px">桌機</option><option value="390px">手機</option></select></label>
  <label class="flex items-center gap-1"><input type="checkbox" data-wf-annotate checked class="checkbox checkbox-xs"> 區塊標註</label>
  <a href="index.html">← 全部頁面</a>
</div>

<div class="wf-canvas bg-base-100 shadow-xl">
  <header id="wf-header" data-active="" data-sub="會員與帳號 / 註冊完成"></header>

  <main class="flex justify-center p-4">
    <div class="wf-region w-full max-w-md">
      <span class="wf-region__label badge badge-primary badge-sm">★ 第一眼焦點 · 完成狀態 + 下一步</span>
      <p class="wf-note">成功頁要明確告知「成功了」與「現在該做什麼」，不要只丟一句完成</p>
      <div class="card bg-base-100 border shadow"><div class="card-body items-center text-center gap-3">
        <div class="text-5xl">✅</div>
        <h1 class="text-xl font-bold">註冊申請已送出</h1>
        <div class="alert alert-info text-sm">我們已寄出驗證信至您的 Email，請點擊信中連結完成啟用。</div>
        <div class="flex gap-2">
          <a class="btn btn-primary" href="login.html">前往登入</a>
          <a class="btn btn-ghost" href="home.html">回首頁</a>
        </div>
        <p class="text-xs opacity-60">沒收到信？<a class="link">重新寄送驗證信</a></p>
      </div></div>
    </div>
  </main>
</div>
<script src="wireframe.js"></script>
</body>
</html>
